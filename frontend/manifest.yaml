apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

spec:
  replicas: 1
  selector:
     matchLabels:
      project: roboshop
      tier: backend
      component: catalogue

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
    spec:
      
      containers:
      - name: catalogue
        image: sreenivaschitti/catalogue:1.0.0
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: catalogue
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
           port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
           

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

spec:
  selector:
    project: roboshop
    tier: backend
    component: catalogue

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080