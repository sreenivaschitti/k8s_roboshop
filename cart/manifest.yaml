apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart

data:
    REDIS_HOST: "redis"
    CATALOGUE_HOST: "catalogue"
    CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart

spec:
  replicas: 1
  selector:
     matchLabels:
      project: roboshop
      tier: backend
      component: cart

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      
      containers:
      - name: cart
        image: sreenivaschitti/cart:1.0.0
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: cart
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
           port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
           

---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart

spec:
  selector:
    project: roboshop
    tier: backend
    component: cart

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080